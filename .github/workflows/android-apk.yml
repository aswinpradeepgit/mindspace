name: Build Android APK

# Build a debug APK in the cloud whenever you push, or on demand.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync Capacitor
        run: npm run android:sync
        env:
          # NEXT_PUBLIC_* values are baked into the client bundle and are public
          # by design (the publishable key is safe to ship). The CI build needs
          # them because .env.local is gitignored.
          NEXT_PUBLIC_SUPABASE_URL: https://pjfrwcvpbcgpslsnzrfi.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_1wzt4TPldkuS_H_yjJvagQ_QGC2-Ohs
          NEXT_PUBLIC_API_URL: https://mindspend-api.onrender.com

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MindSpend-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
